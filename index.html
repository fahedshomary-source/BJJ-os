<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BJJ OS"/>
<meta name="theme-color" content="#0a0a0b"/>
<title>BJJ OS</title>
<link rel="manifest" href="/BJJ-os/manifest.json"/>
<style>
:root{--bg:#0a0a0b;--s1:#141416;--s2:#1c1c1f;--s3:#242428;--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.16);--acc:#e8ff47;--acc2:#ff6b35;--acc3:#4facfe;--tx:#f0f0f0;--tx2:#9a9a9a;--tx3:#4a4a4a;--ok:#4ade80;--err:#f87171;--warn:#fbbf24;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{color:var(--tx);font-family:-apple-system,'SF Pro Display',sans-serif;overflow:hidden;}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.hdr{padding:max(env(safe-area-inset-top),14px) 18px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--b1);flex-shrink:0;}
.hdr-l{display:flex;flex-direction:column;}
.hdr-greet{font-size:10px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;}
.hdr-title{font-size:19px;font-weight:600;color:var(--tx);margin-top:1px;}
.badge{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:500;border:1px solid;}
.b-bjj{background:rgba(232,255,71,.14);color:var(--acc);border-color:rgba(232,255,71,.4);}
.b-str{background:rgba(79,172,254,.14);color:var(--acc3);border-color:rgba(79,172,254,.4);}
.b-rst{background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--b2);}
.b-drl{background:rgba(255,107,53,.14);color:var(--acc2);border-color:rgba(255,107,53,.4);}
.nav{display:flex;padding:8px 12px;gap:4px;border-bottom:0.5px solid var(--b1);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nb.on{background:var(--s2);color:var(--tx);border-color:var(--b2);}
.ct{flex:1;overflow-y:auto;padding:14px 18px;padding-bottom:calc(80px + env(safe-area-inset-bottom));scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ct::-webkit-scrollbar{display:none;}
.sec{margin-bottom:20px;}
.sl{font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;font-weight:500;}
.card{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;}
.ct-title{font-size:13px;font-weight:500;color:var(--tx);}
.ct-sub{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.5;}

/* TIMELINE WITH CHECKBOXES */
.tli{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:.5px solid var(--b1);}
.tli:last-child{border-bottom:none;}
.tlt{font-size:10px;color:var(--tx3);min-width:38px;padding-top:3px;font-variant-numeric:tabular-nums;}
.tld{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.d-w{background:var(--acc3);}.d-e{background:var(--ok);}.d-t{background:var(--acc);}.d-r{background:var(--tx3);}
.tln{font-size:12px;font-weight:500;color:var(--tx);}
.tlsub{font-size:11px;color:var(--tx2);margin-top:1px;line-height:1.4;}
.tl-check{flex:1;}
.chkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--b2);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;margin-top:1px;}
.chkbox.done{background:var(--acc);border-color:var(--acc);}
.chkbox.done svg{opacity:1;}
.chkbox svg{opacity:0;transition:opacity .15s;}
.tli.completed .tln{color:var(--tx3);text-decoration:line-through;}
.tli.completed .tlsub{color:var(--tx3);}

/* WATER */
.wr{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.wc{width:34px;height:42px;border-radius:3px 3px 9px 9px;border:1.5px solid rgba(79,172,254,.2);cursor:pointer;overflow:hidden;display:flex;align-items:flex-end;background:var(--s2);transition:border-color .2s;}
.wc.f{border-color:var(--acc3);}
.wf{width:100%;transition:height .3s;}
.wc.f .wf{background:var(--acc3);height:100%!important;}
.wbtns{display:flex;gap:8px;margin-top:9px;}
.wbtn{flex:1;padding:10px 6px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx);font-size:13px;cursor:pointer;text-align:center;}
.wbtn:active{transform:scale(.97);}
.wbtn.wa{border-color:rgba(79,172,254,.4);background:rgba(79,172,254,.09);color:var(--acc3);}
.wbtn.wr2{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07);color:var(--err);}

/* SMOKE */
.smbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}
.smb{padding:14px 8px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--s2);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;text-align:center;line-height:1.4;}
.smb:active{transform:scale(.97);}
.smb.si{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.1);color:var(--ok);}
.smb.sa{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.1);color:var(--warn);}
.smcts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px;}
.smc{background:var(--s2);border-radius:var(--rs);padding:10px 6px;text-align:center;border:.5px solid var(--b1);}
.smcn{font-size:22px;font-weight:600;line-height:1;}
.smcl{font-size:10px;color:var(--tx2);margin-top:2px;}
.smundo{width:100%;margin-top:8px;padding:10px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;}
.smundo:active{transform:scale(.98);}
.sm-alert{margin-top:9px;padding:9px 12px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:var(--rs);font-size:12px;color:var(--err);line-height:1.5;}
.sm-baseline-info{margin-top:9px;padding:8px 11px;background:var(--s2);border-radius:var(--rs);font-size:11px;color:var(--tx2);line-height:1.5;}

/* ADAPTIVE INSIGHT */
.insight-card{background:rgba(232,255,71,.05);border:1px solid rgba(232,255,71,.18);border-radius:var(--r);padding:13px 15px;margin-bottom:10px;}
.insight-tag{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.insight-text{font-size:12px;color:var(--tx2);line-height:1.6;}

/* TECHNIQUES */
.tc{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.tc.x{border-color:rgba(232,255,71,.25);}
.tch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.tctitle{font-size:13px;font-weight:500;color:var(--tx);}
.tcph{font-size:10px;color:var(--tx3);margin-top:2px;}
.tcr{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tcs{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid;}
.sl0{background:rgba(251,191,36,.1);color:var(--warn);border-color:rgba(251,191,36,.35);}
.sl1{background:rgba(79,172,254,.1);color:var(--acc3);border-color:rgba(79,172,254,.35);}
.sl2{background:rgba(74,222,128,.1);color:var(--ok);border-color:rgba(74,222,128,.35);}
.sl3{background:rgba(232,255,71,.1);color:var(--acc);border-color:rgba(232,255,71,.35);}
.chv{color:var(--tx3);font-size:11px;transition:transform .2s;display:inline-block;}
.tc.x .chv{transform:rotate(180deg);}
.tcb{display:none;margin-top:12px;}
.tc.x .tcb{display:block;}
.yt-thumb{position:relative;border-radius:var(--rs);overflow:hidden;margin-bottom:12px;cursor:pointer;display:block;text-decoration:none;}
.yt-thumb img{width:100%;display:block;object-fit:cover;height:170px;}
.yt-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.yt-play{width:52px;height:52px;border-radius:50%;background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;}
.yt-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.75));padding:8px 10px;font-size:11px;color:#fff;font-weight:500;}
.tcdtl{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:9px;}
.tckl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.tcki{font-size:12px;color:var(--tx2);padding:3px 0 3px 13px;position:relative;line-height:1.4;}
.tcki::before{content:'—';position:absolute;left:0;color:var(--tx3);font-size:10px;top:4px;}
.tcdrill{margin-top:10px;padding:10px 12px;background:rgba(232,255,71,.04);border:.5px solid rgba(232,255,71,.15);border-radius:var(--rs);}
.tcdrillL{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.tcdrillT{font-size:12px;color:var(--tx2);line-height:1.5;}
.tcstrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.tcsb{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--tx2);cursor:pointer;}
.tcsb:active{transform:scale(.97);}
.tc-priority{font-size:10px;color:var(--err);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px;}

/* DRILL GEN */
.drow{display:flex;gap:8px;margin-bottom:10px;}
.dopt{flex:1;padding:11px 4px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;text-align:center;transition:all .15s;}
.dopt.ds{border-color:rgba(232,255,71,.45);background:rgba(232,255,71,.08);color:var(--acc);}
.gbtn{width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--acc);color:#0a0a0b;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.gbtn:active{transform:scale(.98);}
.dsession{background:var(--s1);border:.5px solid rgba(232,255,71,.2);border-radius:var(--r);padding:13px 15px;margin-top:10px;}
.dstep{display:flex;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b1);}
.dstep:last-child{border-bottom:none;}
.dsn{font-size:10px;color:var(--tx3);min-width:17px;padding-top:2px;}
.dstitle{font-size:13px;color:var(--tx);font-weight:500;}
.dsdtl{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4;}
.dstime{font-size:10px;color:var(--tx3);margin-top:3px;}
.focus-tag{font-size:10px;color:var(--err);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}

/* LOG */
.li{width:100%;padding:11px 12px;background:var(--s2);border:.5px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:13px;resize:none;font-family:inherit;line-height:1.5;-webkit-appearance:none;}
.li:focus{outline:none;border-color:rgba(232,255,71,.3);}
.lbtn{width:100%;padding:13px;border-radius:var(--rs);border:1px solid rgba(232,255,71,.35);background:rgba(232,255,71,.08);color:var(--acc);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;}
.lbtn:active{transform:scale(.98);}
.diff-row{display:flex;gap:6px;margin:8px 0;}
.diff-btn{flex:1;padding:9px 4px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:11px;cursor:pointer;text-align:center;transition:all .15s;}
.diff-btn.sel-hard{border-color:rgba(248,113,113,.4);background:rgba(248,113,113,.1);color:var(--err);}
.diff-btn.sel-ok{border-color:rgba(251,191,36,.4);background:rgba(251,191,36,.1);color:var(--warn);}
.diff-btn.sel-good{border-color:rgba(74,222,128,.4);background:rgba(74,222,128,.1);color:var(--ok);}

/* POSITION MAP */
.map-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--tx2);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.pos-info{background:var(--s2);border-radius:var(--r);padding:12px 14px;margin-top:10px;min-height:80px;border:.5px solid var(--b1);}
.pos-info-title{font-size:14px;font-weight:500;color:var(--tx);margin-bottom:3px;}
.pos-info-sub{font-size:11px;color:var(--tx2);margin-bottom:8px;}
.pos-info-row{display:flex;gap:12px;flex-wrap:wrap;}
.pos-info-col{flex:1;min-width:100px;}
.pos-info-label{font-size:9px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:3px;}
.pos-info-items{font-size:11px;color:var(--tx2);line-height:1.6;}
.pos-mark-btn{margin-top:10px;padding:9px 14px;border-radius:var(--rs);border:1px solid rgba(232,255,71,.3);background:rgba(232,255,71,.07);color:var(--acc);font-size:12px;cursor:pointer;width:100%;}
.pos-mark-btn:active{transform:scale(.98);}
.pos-mark-btn.done{border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.07);color:var(--ok);}

/* NOTIFICATIONS */
.nbanner{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.18);border-radius:var(--r);padding:14px 15px;margin-bottom:12px;}
.nbanner-title{font-size:13px;font-weight:500;color:var(--acc);margin-bottom:4px;}
.nbanner-sub{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:10px;}
.rem-btn{display:block;width:100%;padding:11px 14px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx);font-size:12px;cursor:pointer;text-align:left;margin-bottom:6px;text-decoration:none;}
.rem-btn:active{transform:scale(.98);}
.rem-time{font-size:11px;color:var(--acc);font-weight:500;display:block;margin-bottom:2px;}
.rem-text{font-size:12px;color:var(--tx2);}

/* STATS */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.scard{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);padding:12px;}
.snum{font-size:26px;font-weight:600;line-height:1;}
.slabel{font-size:11px;color:var(--tx2);margin-top:4px;}

/* BOTTOM BAR */
.bb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c0c0e;border-top:1px solid rgba(255,255,255,.1);padding:10px 4px;padding-bottom:max(env(safe-area-inset-bottom),16px);display:flex;justify-content:space-around;z-index:100;}
.bbb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 6px;border-radius:var(--rs);border:none;background:transparent;cursor:pointer;min-width:46px;}
.bbb svg{stroke:#4a4a4a;transition:stroke .15s;}
.bbb span{font-size:9px;color:#4a4a4a;font-weight:500;transition:color .15s;}
.bbb.on svg{stroke:#e8ff47;}
.bbb.on span{color:#e8ff47;}
.qcard{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:15px;position:relative;overflow:hidden;}
.qmark{font-size:50px;color:rgba(232,255,71,.06);position:absolute;top:0;left:8px;font-family:Georgia,serif;line-height:1;}
.qtxt{font-size:13px;color:var(--tx);line-height:1.65;font-style:italic;position:relative;}
.qauth{font-size:10px;color:var(--tx3);margin-top:7px;text-transform:uppercase;letter-spacing:.07em;}
.pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.pill{font-size:10px;padding:3px 8px;border-radius:20px;}
.py{border:1px solid rgba(232,255,71,.3);color:var(--acc);background:rgba(232,255,71,.07);}
.pb{border:1px solid rgba(79,172,254,.3);color:var(--acc3);background:rgba(79,172,254,.07);}
.po{border:1px solid rgba(255,107,53,.3);color:var(--acc2);background:rgba(255,107,53,.07);}
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.wkd{display:flex;flex-direction:column;align-items:center;gap:3px;}
.wkdl{font-size:8px;color:var(--tx3);text-transform:uppercase;}
.wkdd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:1px solid var(--b1);color:var(--tx3);background:var(--s2);}
.wkdd.bj{background:rgba(232,255,71,.1);color:var(--acc);border-color:rgba(232,255,71,.35);}
.wkdd.st{background:rgba(79,172,254,.1);color:var(--acc3);border-color:rgba(79,172,254,.35);}
.wkdd.td{box-shadow:0 0 0 2px var(--acc);}
.install-step{display:flex;gap:12px;align-items:flex-start;padding:9px 0;border-bottom:.5px solid var(--b1);}
.install-step:last-child{border-bottom:none;}
.step-num{width:22px;height:22px;border-radius:50%;background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.3);color:var(--acc);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:12px;color:var(--tx2);line-height:1.5;}
.step-bold{color:var(--tx);font-weight:500;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-l">
      <span class="hdr-greet" id="greet">good morning</span>
      <span class="hdr-title">Your BJJ OS</span>
    </div>
    <span class="badge b-bjj" id="dbadge">BJJ Day</span>
  </div>
  <div class="nav">
    <button class="nb on" onclick="go('today')">Today</button>
    <button class="nb" onclick="go('week')">Week</button>
    <button class="nb" onclick="go('tech')">Techniques</button>
    <button class="nb" onclick="go('drill')">Drill Gen</button>
    <button class="nb" onclick="go('map')">Position Map</button>
    <button class="nb" onclick="go('log')">Class Log</button>
    <button class="nb" onclick="go('notif')">Reminders</button>
    <button class="nb" onclick="go('stats')">Stats</button>
  </div>
  <div class="ct" id="ct"></div>
  <div class="bb">
    <button class="bbb on" id="bb-today" onclick="go('today')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><rect x="3" y="3" width="16" height="16" rx="3"/><path d="M3 9h16"/><circle cx="8" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="14" r="1.2" fill="currentColor" stroke="none"/></svg>
      <span>Today</span>
    </button>
    <button class="bbb" id="bb-tech" onclick="go('tech')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M11 7v4l2.5 2.5" stroke-linecap="round"/></svg>
      <span>Learn</span>
    </button>
    <button class="bbb" id="bb-map" onclick="go('map')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M7 11h8M11 7v8" stroke-linecap="round"/></svg>
      <span>Map</span>
    </button>
    <button class="bbb" id="bb-log" onclick="go('log')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><rect x="4" y="3" width="14" height="16" rx="2"/><path d="M8 8h6M8 12h4" stroke-linecap="round"/></svg>
      <span>Log</span>
    </button>
    <button class="bbb" id="bb-stats" onclick="go('stats')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><path d="M4 16l4.5-5 3.5 3.5 5.5-7" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Stats</span>
    </button>
  </div>
</div>

<script>
const SK='bjjos_v4';
let S={
  water:0, smInt:0, smAuto:0, smLog:[], smHistory:[],
  techSt:{}, logs:[], classes:0,
  start:new Date().toISOString().split('T')[0], lastDay:'',
  tasks:{}, posProgress:{},
  adaptiveFocus:[], lastAdaptiveUpdate:'',
  weeklySmAvg:0, smDayCount:0
};

function loadS(){
  try{
    const d=localStorage.getItem(SK);
    if(d){
      const p=JSON.parse(d);
      const t=new Date().toISOString().split('T')[0];
      if(p.lastDay!==t){
        // Archive yesterday's smoke count
        if(p.lastDay && (p.smInt+p.smAuto)>0){
          if(!p.smHistory) p.smHistory=[];
          p.smHistory.push({date:p.lastDay,total:p.smInt+p.smAuto,int:p.smInt,auto:p.smAuto});
          if(p.smHistory.length>14) p.smHistory=p.smHistory.slice(-14);
          // Recalculate rolling average
          const recent=p.smHistory.slice(-7);
          if(recent.length>=3){
            p.weeklySmAvg=Math.round(recent.reduce((a,b)=>a+b.total,0)/recent.length);
            p.smDayCount=recent.length;
          }
        }
        p.water=0; p.smInt=0; p.smAuto=0; p.smLog=[];
        p.tasks={}; p.lastDay=t;
      }
      S={...S,...p};
    }else{S.lastDay=new Date().toISOString().split('T')[0];saveS();}
  }catch(e){}
}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

function dayType(){
  const d=new Date().getDay();
  if(d===6||d===1)return'bjj';
  if(d===3)return'drill';
  if(d===0||d===2||d===4)return'str';
  return'rest';
}

// ADAPTIVE CURRICULUM ENGINE
function getAdaptiveFocus(){
  if(S.logs.length<3) return null;
  const recent=S.logs.slice(-3);
  const hardItems=[];
  recent.forEach(l=>{
    if(l.diff==='hard'&&l.techFocus) hardItems.push(l.techFocus);
    if(l.c){
      const txt=l.c.toLowerCase();
      if(txt.includes('guard'))hardItems.push('guard');
      if(txt.includes('back'))hardItems.push('back');
      if(txt.includes('escape')||txt.includes('stuck'))hardItems.push('escape');
      if(txt.includes('choke')||txt.includes('rnc'))hardItems.push('rnc');
      if(txt.includes('turtle'))hardItems.push('turtle');
      if(txt.includes('x guard')||txt.includes('xguard'))hardItems.push('xguard');
    }
  });
  if(hardItems.length===0) return null;
  const freq={};
  hardItems.forEach(i=>{freq[i]=(freq[i]||0)+1;});
  const top=Object.entries(freq).sort((a,b)=>b[1]-a[1])[0];
  return top?top[0]:null;
}

function updateAdaptive(){
  const focus=getAdaptiveFocus();
  if(focus&&focus!==S.adaptiveFocus[0]){
    S.adaptiveFocus=[focus,...S.adaptiveFocus].slice(0,3);
    S.lastAdaptiveUpdate=new Date().toISOString().split('T')[0];
    saveS();
  }
}

function daysUntilBaseline(){

}

function rDrill(){
  const focus=getAdaptiveFocus();
  const focusLabels={back:'back control',rnc:'RNC finishing',turtle:'turtle entries',guard:'guard recovery',xguard:'X-guard',escape:'escape movements'};
  const focusNote=focus&&S.logs.length>=3?`<div class="insight-card" style="margin-bottom:10px">
    <div class="insight-tag">Adaptive — based on last 3 sessions</div>
    <div class="insight-text">Session weighted toward <strong style="color:var(--tx)">${focusLabels[focus]||focus}</strong> based on your recent logs.</div>
  </div>`:'';
  return`<div class="sec"><div class="sl">Generate drilling session</div>
    ${focusNote}
    <div class="card">
      <div class="ct-sub" style="margin-bottom:8px">How long do you have?</div>
      <div class="drow">${['10','20','30'].map(t=>`<div class="dopt ${dtime===t?'ds':''}" onclick="setDO('t','${t}')">${t} min</div>`).join('')}</div>
      <div class="ct-sub" style="margin-bottom:8px">Is your brother here?</div>
      <div class="drow">
        <div class="dopt ${dpart==='yes'?'ds':''}" onclick="setDO('p','yes')">Yes, he's here</div>
        <div class="dopt ${dpart==='no'?'ds':''}" onclick="setDO('p','no')">Solo today</div>
      </div>
      <button class="gbtn" onclick="genDrill()">Generate session</button>
    </div>
    <div id="dout"></div></div>
  <div class="sec"><div class="sl">Strength programs</div>
    <div class="card"><div class="ct-title">Day A — Hip & Pull</div><div class="ct-sub" style="margin-top:5px">KB swings 3×15 · DB Romanian deadlift 3×10 · DB rows 3×10/side · Dead hang 3×max</div></div>
    <div class="card"><div class="ct-title">Day B — Push & Core</div><div class="ct-sub" style="margin-top:5px">Push-ups 4×failure · DB overhead press 3×10 · Plank 3×40s · Hollow body hold 3×20s</div></div>
    <div class="card"><div class="ct-title">Day C — Mobility</div><div class="ct-sub" style="margin-top:5px">Hip flexors 5min · Thoracic rotation 3×10/side · Glute bridges 3×15 · Neck static hold · Shoulder circles</div></div>
  </div>`;
}
function setDO(type,val){if(type==='t')dtime=val;else dpart=val;document.getElementById('ct').innerHTML=rDrill();}
function genDrill(){
  const t=parseInt(dtime),p=dpart==='yes';
  const focus=getAdaptiveFocus();
  const focusSteps={
    guard:[{title:'Guard recovery — priority drill',d:'Partner in your guard tries to pass. You shrimp and replace guard ONLY. No attacks. 20 reps each side. Every rep.',time:'8 min'}],
    back:[{title:'Back control — priority drill',d:'Turtle to back take 20 reps. Then hold back control for 45s each with partner resisting. Focus: seatbelt stays connected.',time:'8 min'}],
    turtle:[{title:'Turtle escape — priority drill',d:'Partner on your back in turtle. You must recover guard before hooks go in. 15 reps. Speed matters here.',time:'7 min'}],
    rnc:[{title:'RNC mechanics — priority drill',d:'In back control, drill arm under chin to bicep grip 25 times without squeezing. Perfect position every rep.',time:'6 min'}],
    xguard:[{title:'X-guard — priority drill',d:'Get into X-guard shape from seated position 15 times. Feel both control points (ankle + back of knee). Then sweep 10 times.',time:'7 min'}],
    escape:[{title:'Side control escape — priority drill',d:'Under side control. Elbow-knee frame immediately, shrimp and recover guard. 20 reps each side.',time:'8 min'}],
  };
  let steps=p?[
    {title:'Warm-up — shrimping',d:'Shrimp across mat and back 3 times. Hips moving before anything.',time:'3 min'},
    {title:'Back control hold',d:'Seatbelt + hooks. Partner resists. Keep connected. Follow shoulders.',time:t<=10?'4 min':'5 min'},
    {title:'Turtle to back take',d:'Partner turtles. Seatbelt entry + tilt. 10 reps each. Slow.',time:t<=10?'4 min':'5 min'},
  ]:[
    {title:'Hip escapes',d:'Shrimp one end to other and back. 5 full lengths.',time:'4 min'},
    {title:'Guard frame hold',d:'On back. Elbow-knee frame structure. Hold 10 times.',time:'3 min'},
    {title:'Visualization',d:'Eyes closed. Turtle → seatbelt → hooks. 10 times. Exact hand placement.',time:'5 min'},
  ];
  if(focus&&p&&focusSteps[focus]&&t>=20){
    steps.splice(1,0,...focusSteps[focus]);
  }
  if(t>=20&&p&&!steps.find(s=>s.title.includes('RNC')))steps.push({title:'RNC arm positioning',d:'Back control, arm under chin without squeezing. Position only, 15 reps.',time:'5 min'});
  if(t>=20&&p&&steps.length<5)steps.push({title:'Positional round',d:'Back control live. You attack, they resist. 2 rounds × 2 min.',time:'5 min'});
  if(t>=20&&!p&&steps.length<4)steps.push({title:'Shoulder mobility',d:'Arm circles, thoracic rotation. Direct impact on back control.',time:'6 min'});
  if(t>=30&&steps.length<6)steps.push({title:'Guard recovery',d:p?'Partner passes, you recover guard only. Survival. 15 reps.':'Slow-motion: frame, shrimp, knee in. 10 reps each side.',time:'5 min'});
  document.getElementById('dout').innerHTML=`<div class="dsession">
    <div style="font-size:13px;font-weight:500;color:var(--acc);margin-bottom:11px">${t}-min ${p?'partner':'solo'} session${focus&&S.logs.length>=3?' · adapted to your logs':''}</div>
    ${steps.map((s,i)=>`<div class="dstep"><div class="dsn">${i+1}</div><div><div class="dstitle">${s.title}</div><div class="dsdtl">${s.d}</div><div class="dstime">${s.time}</div></div></div>`).join('')}
  </div>`;}

function rMap(){
  const mapSvg=buildMapSvg();
  const selData=selPos?POS_DATA[selPos]:null;
  const isDone=selPos&&S.posProgress&&S.posProgress[selPos];
  return`<div class="sec"><div class="sl">Position map</div>
    <div class="map-legend">
      <div class="leg-item"><div class="leg-dot" style="background:#534AB7"></div>Dominant</div>
      <div class="leg-item"><div class="leg-dot" style="background:#0F6E56"></div>Neutral</div>
      <div class="leg-item"><div class="leg-dot" style="background:#854F0B"></div>Defensive</div>
      <div class="leg-item"><div class="leg-dot" style="background:#4ade80"></div>Completed</div>
    </div>
    <div class="card" style="padding:10px">${mapSvg}</div>
    <div class="pos-info" id="pos-info">
      ${selData?`
        <div class="pos-info-title">${selData.title}</div>
        <div class="pos-info-sub" style="color:${selData.color}">${selData.tier}</div>
        <div class="pos-info-row">
          <div class="pos-info-col"><div class="pos-info-label">Submissions</div><div class="pos-info-items">${selData.subs.join('<br>')}</div></div>
          <div class="pos-info-col"><div class="pos-info-label">Transitions</div><div class="pos-info-items">${selData.trans.join('<br>')}</div></div>
        </div>
        <div style="margin-top:9px;font-size:11px;color:var(--tx2);padding:8px 10px;background:var(--s1);border-radius:var(--rs);line-height:1.5">${selData.note}</div>
        <button class="pos-mark-btn ${isDone?'done':''}" onclick="markPos('${selPos}')">
          ${isDone?'✓ Marked as trained — tap to unmark':'Mark as trained today'}
        </button>
      `:`<div style="font-size:12px;color:var(--tx3);padding:8px 0">Tap any position on the map to see submissions, transitions, and notes.</div>`}
    </div>
  </div>`;
}

function buildMapSvg(){
  const nodes=[
    {id:'back',label:'Back control',x:220,y:30,w:150,h:52,color:'#534AB7',fill:'rgba(83,74,183,0.15)',tier:0},
    {id:'mount',label:'Mount',x:60,y:30,w:120,h:52,color:'#534AB7',fill:'rgba(83,74,183,0.15)',tier:0},
    {id:'ns',label:'North-south',x:400,y:30,w:130,h:52,color:'#534AB7',fill:'rgba(83,74,183,0.15)',tier:0},
    {id:'side',label:'Side control',x:60,y:120,w:130,h:52,color:'#0F6E56',fill:'rgba(15,110,86,0.15)',tier:1},
    {id:'kob',label:'Knee on belly',x:220,y:120,w:130,h:52,color:'#0F6E56',fill:'rgba(15,110,86,0.15)',tier:1},
    {id:'turtle',label:'Turtle',x:400,y:120,w:120,h:52,color:'#854F0B',fill:'rgba(133,79,11,0.15)',tier:1},
    {id:'closed',label:'Closed guard',x:40,y:215,w:130,h:52,color:'#0F6E56',fill:'rgba(15,110,86,0.15)',tier:2},
    {id:'half',label:'Half guard',x:195,y:215,w:120,h:52,color:'#0F6E56',fill:'rgba(15,110,86,0.15)',tier:2},
    {id:'xguard',label:'X-guard',x:340,y:215,w:120,h:52,color:'#0F6E56',fill:'rgba(15,110,86,0.15)',tier:2},
    {id:'undermount',label:'Under mount',x:40,y:310,w:130,h:52,color:'#993C1D',fill:'rgba(153,60,29,0.15)',tier:3},
    {id:'underside',label:'Under side ctrl',x:195,y:310,w:130,h:52,color:'#993C1D',fill:'rgba(153,60,29,0.15)',tier:3},
    {id:'underback',label:'Back taken',x:365,y:310,w:120,h:52,color:'#7f1d1d',fill:'rgba(127,29,29,0.15)',tier:3},
  ];
  const arrows=[
    {x1:295,y1:82,x2:170,y2:120},{x1:355,y1:82,x2:408,y2:120},
    {x1:125,y1:82,x2:125,y2:120},{x1:180,y1:145,x2:220,y2:145},
    {x1:400,y1:145,x2:390,y2:120,curved:true},
    {x1:105,y1:172,x2:105,y2:215},{x1:285,y1:240,x2:195,y2:240},
    {x1:315,y1:240,x2:340,y2:240},{x1:400,y1:215,x2:375,y2:172},
    {x1:460,y1:172,x2:477,y2:310},{x1:105,y1:267,x2:105,y2:310},
    {x1:260,y1:267,x2:260,y2:310},{x1:105,y1:215,x2:90,y2:172,dashed:true},
  ];
  const tierLabels=[
    {x:5,y:56,text:'DOM',color:'#534AB7'},
    {x:5,y:146,text:'NEU',color:'#0F6E56'},
    {x:5,y:241,text:'GRD',color:'#0F6E56'},
    {x:5,y:336,text:'DEF',color:'#993C1D'},
  ];
  let svgContent=`<defs><marker id="ma" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>`;
  tierLabels.forEach(l=>{
    svgContent+=`<text x="${l.x}" y="${l.y}" font-size="8" fill="${l.color}" font-family="-apple-system,sans-serif" font-weight="600" text-anchor="start" dominant-baseline="central" opacity="0.7">${l.text}</text>`;
  });
  arrows.forEach(a=>{
    const dash=a.dashed?'stroke-dasharray="4 3"':'';
    svgContent+=`<line x1="${a.x1}" y1="${a.y1}" x2="${a.x2}" y2="${a.y2}" stroke="rgba(255,255,255,0.15)" stroke-width="1" marker-end="url(#ma)" ${dash} fill="none"/>`;
  });
  nodes.forEach(n=>{
    const done=S.posProgress&&S.posProgress[n.id];
    const isSelected=selPos===n.id;
    const fillColor=done?'rgba(74,222,128,0.2)':n.fill;
    const strokeColor=done?'#4ade80':isSelected?'#e8ff47':n.color;
    const strokeW=isSelected?1.5:0.5;
    svgContent+=`<g onclick="tapPos('${n.id}')" style="cursor:pointer">
      <rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="8" fill="${fillColor}" stroke="${strokeColor}" stroke-width="${strokeW}"/>
      ${done?`<text x="${n.x+n.w-10}" y="${n.y+12}" font-size="9" fill="#4ade80" font-family="-apple-system,sans-serif" text-anchor="middle">✓</text>`:''}
      <text x="${n.x+n.w/2}" y="${n.y+n.h/2-6}" font-size="11" fill="${done?'#4ade80':n.color}" font-family="-apple-system,sans-serif" font-weight="600" text-anchor="middle" dominant-baseline="central">${n.label}</text>
      ${n.id==='back'?`<text x="${n.x+n.w/2}" y="${n.y+n.h/2+10}" font-size="8" fill="${n.color}" font-family="-apple-system,sans-serif" text-anchor="middle" opacity="0.7">★ north star</text>`:''}
    </g>`;
  });
  return`<svg width="100%" viewBox="0 0 530 380" style="display:block">${svgContent}</svg>`;
}

function tapPos(id){
  selPos=id;
  go('map');
}
function markPos(id){
  if(!S.posProgress)S.posProgress={};
  S.posProgress[id]=!S.posProgress[id];
  saveS();
  go('map');
}

function rLog(){
  const entries=S.logs.slice(-5).reverse();
  selDiff='';selTech='';
  return`<div class="sec"><div class="sl">Log today's class</div>
    <div class="card">
      <div style="font-size:11px;color:var(--tx2);margin-bottom:10px;line-height:1.5">Do this within an hour of class. Your logs adapt the drill plan.</div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:6px">How did it feel overall?</div>
      <div class="diff-row">
        <div class="diff-btn" id="d-hard" onclick="setDiff('hard')">Hard — struggled</div>
        <div class="diff-btn" id="d-ok" onclick="setDiff('ok')">OK — getting there</div>
        <div class="diff-btn" id="d-good" onclick="setDiff('good')">Good — felt it</div>
      </div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:6px;margin-top:10px">Which technique were you focusing on?</div>
      <div class="diff-row" style="flex-wrap:wrap">
        ${['back','rnc','turtle','guard','xguard','bow'].map(id=>`<div class="diff-btn" id="t-${id}" onclick="setTech('${id}')" style="flex:none;padding:7px 10px">${TECHS.find(t=>t.id===id)?.title.split('—')[0].trim()||id}</div>`).join('')}
      </div>
      <div style="font-size:12px;color:var(--tx2);margin-bottom:5px;margin-top:10px">One thing that worked</div>
      <textarea class="li" id="lw" rows="2" placeholder="Even tiny wins count..."></textarea>
      <div style="font-size:12px;color:var(--tx2);margin:10px 0 5px">One thing that caught you</div>
      <textarea class="li" id="lc" rows="2" placeholder="Be specific — position, moment, why..."></textarea>
      <button class="lbtn" onclick="saveLog()">Save class log</button>
    </div></div>
  ${entries.length?`<div class="sec"><div class="sl">Recent entries</div>
    ${entries.map(e=>`<div class="card" style="margin-bottom:8px">
      <div style="font-size:10px;color:var(--tx3);margin-bottom:5px">${e.date}${e.diff?` · <span style="color:${e.diff==='hard'?'var(--err)':e.diff==='good'?'var(--ok)':'var(--warn)'}">${e.diff}</span>`:''}</div>
      ${e.w?`<div style="font-size:12px;color:var(--ok);margin-bottom:3px;line-height:1.4">+ ${e.w}</div>`:''}
      ${e.c?`<div style="font-size:12px;color:var(--warn);line-height:1.4">↓ ${e.c}</div>`:''}
    </div>`).join('')}</div>`:''}`;
}
function setDiff(d){
  selDiff=d;
  ['hard','ok','good'].forEach(v=>{const el=document.getElementById('d-'+v);if(el)el.className='diff-btn'+(v===d?' sel-'+v:'');});
}
function setTech(id){
  selTech=id;
  ['back','rnc','turtle','guard','xguard','bow'].forEach(v=>{const el=document.getElementById('t-'+v);if(el){el.className='diff-btn'+(v===id?' sel-ok':'');}});
}
function saveLog(){
  const w=document.getElementById('lw')?.value.trim();
  const c=document.getElementById('lc')?.value.trim();
  if(!w&&!c&&!selDiff) return;
  S.logs.push({date:new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}),w,c,diff:selDiff,techFocus:selTech});
  S.classes++;
  updateAdaptive();
  saveS();
  go('log');
}

function rNotif(){
  const REMINDERS=[
    {time:'6:30 AM',title:'Morning water',body:'500ml water before anything else.',cat:'cal'},
    {time:'7:00 AM',title:'Eating moment 1',body:'Eggs or labneh + bread. 5 minutes.',cat:'cal'},
    {time:'9:00 AM',title:'Desk water bottle',body:'500ml target before 11am.',cat:'cal'},
    {time:'1:00 PM',title:'Eating moment 2',body:'Order or eat at home.',cat:'cal'},
    {time:'3:00 PM',title:'Afternoon water',body:'500ml now.',cat:'cal'},
    {time:'8:00 PM',title:'Cut the maté',body:'Switch to water only from here.',cat:'rem'},
    {time:'10:00 PM',title:'Post-class meal',body:'Protein within 90min of training.',cat:'cal'},
  ];
  function encodeReminder(r){
    const enc=encodeURIComponent;
    if(r.cat==='cal'){
      return`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${enc(r.title)}&details=${enc(r.body)}&recur=RRULE:FREQ=DAILY`;
    }
    return`x-apple-reminderkit://REMCDReminder?title=${enc(r.title)}&notes=${enc(r.body)}`;
  }
  return`<div class="sec"><div class="sl">Set up daily reminders</div>
    <div class="nbanner">
      <div class="nbanner-title">iPhone reminders — reliable delivery</div>
      <div class="nbanner-sub">Safari notifications only fire when the app is open. For reliable background alerts, add these directly to your iPhone Reminders or Google Calendar — they fire even when your phone is locked. Tap each one below.</div>
    </div>
    <div class="sec"><div class="sl">Tap to add each reminder</div>
      ${REMINDERS.map(r=>`<a class="rem-btn" href="${encodeReminder(r)}" target="_blank">
        <span class="rem-time">${r.time}</span>
        <span class="rem-text">${r.title} — ${r.body}</span>
      </a>`).join('')}
    </div>
    <div class="sec"><div class="sl">Add to home screen (iPhone)</div>
      <div class="card"><div class="install-steps">
        ${[['Open this URL in','Safari (not Chrome)'],['Tap','Share button — box with arrow pointing up'],['Scroll down, tap','Add to Home Screen'],['Tap','Add — top right corner'],['Open from home screen','behaves like a native app']].map((s,i)=>`<div class="install-step"><div class="step-num">${i+1}</div><div class="step-txt">${s[0]} <span class="step-bold">${s[1]}</span></div></div>`).join('')}
      </div></div>
    </div></div>`;
}

function rStats(){
  const tot=S.smInt+S.smAuto;
  const done=Object.values(S.techSt).filter(s=>s==='Got it'||s==='Feeling it').length;
  const posDone=Object.values(S.posProgress||{}).filter(Boolean).length;
  const weeks=Math.max(1,Math.round((new Date()-new Date(S.start))/(7*86400000)));
  const tasksDone=Object.values(S.tasks||{}).filter(Boolean).length;
  const tasksTotal=getTasksForDay(dayType()).length;
  const completionPct=tasksTotal?Math.round(tasksDone/tasksTotal*100):0;
  const pct=tot?Math.round(S.smInt/tot*100):0;
  return`<div class="sec"><div class="sl">Your journey</div>
    <div class="sgrid">
      <div class="scard"><div class="snum" style="color:var(--acc)">${S.classes}</div><div class="slabel">classes logged</div></div>
      <div class="scard"><div class="snum" style="color:var(--acc3)">${weeks}</div><div class="slabel">weeks in</div></div>
      <div class="scard"><div class="snum" style="color:var(--acc2)">${done}</div><div class="slabel">techniques feeling it+</div></div>
      <div class="scard"><div class="snum" style="color:var(--ok)">${posDone}</div><div class="slabel">positions trained</div></div>
    </div></div>
  <div class="sec"><div class="sl">Today's completion</div>
    <div class="card">
      <div style="display:flex;align-items:center;gap:12px">
        <div style="font-size:32px;font-weight:600;color:${completionPct===100?'var(--ok)':'var(--acc)'}">${completionPct}%</div>
        <div>
          <div style="font-size:13px;color:var(--tx)">${tasksDone} of ${tasksTotal} tasks done</div>
          <div style="font-size:11px;color:var(--tx2);margin-top:2px">${completionPct===100?'Full day completed.':completionPct>=60?'Good progress today.':'Keep going — check off tasks as you do them.'}</div>
        </div>
      </div>
      <div style="margin-top:10px;height:6px;background:var(--s2);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${completionPct}%;background:${completionPct===100?'var(--ok)':'var(--acc)'};border-radius:3px;transition:width .3s"></div>
      </div>
    </div></div>
  <div class="sec"><div class="sl">Technique progress</div>
    <div class="card">${TECHS.map(t=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:.5px solid var(--b1)">
      <div style="font-size:12px;color:var(--tx);flex:1;padding-right:8px">${t.title.split('—')[0].trim()}</div>
      <span class="tcs ${stCls(t.id)}">${stLbl(t.id)}</span></div>`).join('')}</div></div>
  <div class="sec"><div class="sl">Smoking — today</div>
    <div class="card">
      <div class="sgrid" style="margin-bottom:8px">
        <div class="scard"><div class="snum" style="color:var(--ok)">${S.smInt}</div><div class="slabel">intentional</div></div>
        <div class="scard"><div class="snum" style="color:var(--warn)">${S.smAuto}</div><div class="slabel">automatic</div></div>
      </div>
      ${S.weeklySmAvg>0?`<div style="font-size:11px;color:var(--tx2)">Rolling average: ${S.weeklySmAvg}/day. ${tot>0?pct+'% intentional today.':''}</div>`:'<div style="font-size:11px;color:var(--tx3)">Building baseline — keep logging daily.</div>'}
      ${S.smHistory&&S.smHistory.length>0?`<div style="margin-top:10px">
        <div style="font-size:10px;color:var(--tx3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em">Last ${S.smHistory.length} days</div>
        <div style="display:flex;gap:3px;align-items:flex-end;height:40px">
          ${S.smHistory.slice(-10).map(d=>{const h=S.weeklySmAvg?Math.min(100,Math.round(d.total/S.weeklySmAvg*50)):25;const over=S.weeklySmAvg&&d.total>S.weeklySmAvg;return`<div style="flex:1;height:${Math.max(4,h)}%;background:${over?'var(--warn)':'var(--acc3)'};border-radius:2px;opacity:.7" title="${d.date}: ${d.total}"></div>`;}).join('')}
        </div>
      </div>`:''}
    </div></div>`;
}

function init(){
  loadS();
  const h=new Date().getHours();
  document.getElementById('greet').textContent=h<12?'good morning':h<17?'good afternoon':'good evening';
  const type=dayType();
  const badge=document.getElementById('dbadge');
  badge.textContent={bjj:'BJJ Day',drill:'Drilling Day',str:'Strength Day',rest:'Rest Day'}[type];
  badge.className='badge '+{bjj:'b-bjj',drill:'b-drl',str:'b-str',rest:'b-rst'}[type];
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/BJJ-os/sw.js',{scope:'/BJJ-os/'}).catch(()=>{});
  go('today');
}
init();
</script>
</body>
</html>
