<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="BJJ OS"/>
<meta name="theme-color" content="#0a0a0b"/>
<meta name="description" content="Your personal BJJ lifestyle OS — schedule, techniques, hydration, drilling, and habit tracking."/>
<title>BJJ OS</title>
<link rel="manifest" href="manifest.json"/>
<style>
:root{--bg:#0a0a0b;--s1:#141416;--s2:#1c1c1f;--s3:#242428;--b1:rgba(255,255,255,0.08);--b2:rgba(255,255,255,0.16);--acc:#e8ff47;--acc2:#ff6b35;--acc3:#4facfe;--tx:#f0f0f0;--tx2:#9a9a9a;--tx3:#4a4a4a;--ok:#4ade80;--err:#f87171;--warn:#fbbf24;--r:14px;--rs:8px;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);}
body{color:var(--tx);font-family:-apple-system,'SF Pro Display',sans-serif;overflow:hidden;}
.app{max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:var(--bg);}
.hdr{padding:env(safe-area-inset-top,14px) 18px 12px;padding-top:max(env(safe-area-inset-top),14px);display:flex;align-items:center;justify-content:space-between;border-bottom:0.5px solid var(--b1);flex-shrink:0;}
.hdr-l{display:flex;flex-direction:column;}
.hdr-greet{font-size:10px;color:var(--tx2);letter-spacing:.1em;text-transform:uppercase;}
.hdr-title{font-size:19px;font-weight:600;color:var(--tx);margin-top:1px;}
.badge{font-size:10px;padding:4px 10px;border-radius:20px;font-weight:500;border:1px solid;}
.b-bjj{background:rgba(232,255,71,.14);color:var(--acc);border-color:rgba(232,255,71,.4);}
.b-str{background:rgba(79,172,254,.14);color:var(--acc3);border-color:rgba(79,172,254,.4);}
.b-rst{background:rgba(255,255,255,.06);color:var(--tx2);border-color:var(--b2);}
.b-drl{background:rgba(255,107,53,.14);color:var(--acc2);border-color:rgba(255,107,53,.4);}
.nav{display:flex;padding:8px 12px;gap:4px;border-bottom:0.5px solid var(--b1);overflow-x:auto;scrollbar-width:none;flex-shrink:0;}
.nav::-webkit-scrollbar{display:none;}
.nb{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1px solid transparent;background:transparent;color:var(--tx2);font-size:12px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.nb.on{background:var(--s2);color:var(--tx);border-color:var(--b2);}
.ct{flex:1;overflow-y:auto;padding:14px 18px;padding-bottom:calc(80px + env(safe-area-inset-bottom));scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.ct::-webkit-scrollbar{display:none;}
.sec{margin-bottom:20px;}
.sl{font-size:10px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase;margin-bottom:9px;font-weight:500;}
.card{background:var(--s1);border:0.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;margin-bottom:9px;}
.ct-title{font-size:13px;font-weight:500;color:var(--tx);}
.ct-sub{font-size:11px;color:var(--tx2);margin-top:3px;line-height:1.5;}
.tl{display:flex;flex-direction:column;}
.tli{display:flex;gap:11px;align-items:flex-start;padding:8px 0;border-bottom:.5px solid var(--b1);}
.tli:last-child{border-bottom:none;}
.tlt{font-size:10px;color:var(--tx3);min-width:38px;padding-top:2px;font-variant-numeric:tabular-nums;}
.tld{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0;}
.d-w{background:var(--acc3);}.d-e{background:var(--ok);}.d-t{background:var(--acc);}.d-r{background:var(--tx3);}
.tln{font-size:12px;font-weight:500;color:var(--tx);}
.tlsub{font-size:11px;color:var(--tx2);margin-top:1px;line-height:1.4;}
.wr{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.wc{width:34px;height:42px;border-radius:3px 3px 9px 9px;border:1.5px solid rgba(79,172,254,.2);cursor:pointer;overflow:hidden;display:flex;align-items:flex-end;background:var(--s2);transition:border-color .2s;}
.wc.f{border-color:var(--acc3);}
.wf{width:100%;transition:height .3s;}
.wc.f .wf{background:var(--acc3);height:100%!important;}
.wbtns{display:flex;gap:8px;margin-top:9px;}
.wbtn{flex:1;padding:10px 6px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx);font-size:13px;cursor:pointer;transition:all .15s;text-align:center;}
.wbtn:active{transform:scale(.97);}
.wbtn.wa{border-color:rgba(79,172,254,.4);background:rgba(79,172,254,.09);color:var(--acc3);}
.wbtn.wr2{border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.07);color:var(--err);}
.smbtns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}
.smb{padding:14px 8px;border-radius:var(--rs);border:1.5px solid var(--b2);background:var(--s2);color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;line-height:1.4;}
.smb:active{transform:scale(.97);}
.smb.si{border-color:rgba(74,222,128,.5);background:rgba(74,222,128,.1);color:var(--ok);}
.smb.sa{border-color:rgba(251,191,36,.5);background:rgba(251,191,36,.1);color:var(--warn);}
.smcts{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:9px;}
.smc{background:var(--s2);border-radius:var(--rs);padding:10px 6px;text-align:center;border:.5px solid var(--b1);}
.smcn{font-size:22px;font-weight:600;line-height:1;}
.smcl{font-size:10px;color:var(--tx2);margin-top:2px;}
.smundo{width:100%;margin-top:8px;padding:10px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;}
.smundo:active{transform:scale(.98);}
.tc{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.tc.x{border-color:rgba(232,255,71,.25);}
.tch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
.tctitle{font-size:13px;font-weight:500;color:var(--tx);}
.tcph{font-size:10px;color:var(--tx3);margin-top:2px;}
.tcr{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.tcs{font-size:10px;padding:2px 8px;border-radius:20px;border:1px solid;}
.sl0{background:rgba(251,191,36,.1);color:var(--warn);border-color:rgba(251,191,36,.35);}
.sl1{background:rgba(79,172,254,.1);color:var(--acc3);border-color:rgba(79,172,254,.35);}
.sl2{background:rgba(74,222,128,.1);color:var(--ok);border-color:rgba(74,222,128,.35);}
.sl3{background:rgba(232,255,71,.1);color:var(--acc);border-color:rgba(232,255,71,.35);}
.chv{color:var(--tx3);font-size:11px;transition:transform .2s;display:inline-block;}
.tc.x .chv{transform:rotate(180deg);}
.tcb{display:none;margin-top:12px;}
.tc.x .tcb{display:block;}
.yt-thumb{position:relative;border-radius:var(--rs);overflow:hidden;margin-bottom:12px;cursor:pointer;display:block;text-decoration:none;}
.yt-thumb img{width:100%;display:block;object-fit:cover;height:180px;}
.yt-overlay{position:absolute;inset:0;background:rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;}
.yt-play{width:54px;height:54px;border-radius:50%;background:rgba(255,0,0,.9);display:flex;align-items:center;justify-content:center;}
.yt-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.78));padding:8px 10px;font-size:11px;color:#fff;font-weight:500;}
.tcdtl{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:9px;}
.tckl{font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;}
.tcki{font-size:12px;color:var(--tx2);padding:3px 0 3px 13px;position:relative;line-height:1.4;}
.tcki::before{content:'—';position:absolute;left:0;color:var(--tx3);font-size:10px;top:4px;}
.tcdrill{margin-top:10px;padding:10px 12px;background:rgba(232,255,71,.04);border:.5px solid rgba(232,255,71,.15);border-radius:var(--rs);}
.tcdrillL{font-size:10px;color:var(--acc);text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px;}
.tcdrillT{font-size:12px;color:var(--tx2);line-height:1.5;}
.tcstrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;}
.tcsb{font-size:11px;padding:5px 11px;border-radius:20px;border:1px solid var(--b2);background:var(--s2);color:var(--tx2);cursor:pointer;transition:all .15s;}
.tcsb:active{transform:scale(.97);}
.drow{display:flex;gap:8px;margin-bottom:10px;}
.dopt{flex:1;padding:11px 4px;border-radius:var(--rs);border:1px solid var(--b2);background:var(--s2);color:var(--tx2);font-size:12px;cursor:pointer;text-align:center;transition:all .15s;}
.dopt.ds{border-color:rgba(232,255,71,.45);background:rgba(232,255,71,.08);color:var(--acc);}
.gbtn{width:100%;padding:14px;border-radius:var(--r);border:none;background:var(--acc);color:#0a0a0b;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px;}
.gbtn:active{transform:scale(.98);}
.dsession{background:var(--s1);border:.5px solid rgba(232,255,71,.2);border-radius:var(--r);padding:13px 15px;margin-top:10px;}
.dstep{display:flex;gap:10px;padding:7px 0;border-bottom:.5px solid var(--b1);}
.dstep:last-child{border-bottom:none;}
.dsn{font-size:10px;color:var(--tx3);min-width:17px;padding-top:2px;}
.dstitle{font-size:13px;color:var(--tx);font-weight:500;}
.dsdtl{font-size:11px;color:var(--tx2);margin-top:2px;line-height:1.4;}
.dstime{font-size:10px;color:var(--tx3);margin-top:3px;}
.li{width:100%;padding:11px 12px;background:var(--s2);border:.5px solid var(--b1);border-radius:var(--rs);color:var(--tx);font-size:13px;resize:none;font-family:inherit;line-height:1.5;-webkit-appearance:none;}
.li:focus{outline:none;border-color:rgba(232,255,71,.3);}
.lbtn{width:100%;padding:13px;border-radius:var(--rs);border:1px solid rgba(232,255,71,.35);background:rgba(232,255,71,.08);color:var(--acc);font-size:13px;font-weight:500;cursor:pointer;margin-top:8px;}
.lbtn:active{transform:scale(.98);}
.nbanner{background:rgba(232,255,71,.06);border:1px solid rgba(232,255,71,.18);border-radius:var(--r);padding:14px 15px;margin-bottom:12px;}
.nbanner-title{font-size:13px;font-weight:500;color:var(--acc);margin-bottom:4px;}
.nbanner-sub{font-size:12px;color:var(--tx2);line-height:1.6;margin-bottom:10px;}
.nenablebtn{width:100%;padding:12px;border-radius:var(--rs);border:none;background:var(--acc);color:#0a0a0b;font-size:13px;font-weight:600;cursor:pointer;}
.nenablebtn:active{transform:scale(.98);}
.nstatus{font-size:11px;color:var(--tx2);text-align:center;margin-top:7px;}
.nitem{display:flex;align-items:center;gap:10px;padding:9px 12px;background:var(--s2);border-radius:var(--rs);margin-bottom:5px;}
.ntime{font-size:11px;color:var(--acc);min-width:42px;font-weight:500;}
.ntext{font-size:12px;color:var(--tx2);line-height:1.4;}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.scard{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--rs);padding:12px;}
.snum{font-size:26px;font-weight:600;line-height:1;}
.slabel{font-size:11px;color:var(--tx2);margin-top:4px;}
.bb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#0c0c0e;border-top:1px solid rgba(255,255,255,.1);padding:10px 6px;padding-bottom:max(env(safe-area-inset-bottom),16px);display:flex;justify-content:space-around;z-index:100;}
.bbb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 8px;border-radius:var(--rs);border:none;background:transparent;cursor:pointer;min-width:52px;}
.bbb svg{stroke:#4a4a4a;transition:stroke .15s;}
.bbb span{font-size:10px;color:#4a4a4a;font-weight:500;transition:color .15s;}
.bbb.on svg{stroke:#e8ff47;}
.bbb.on span{color:#e8ff47;}
.qcard{background:var(--s1);border:.5px solid var(--b1);border-radius:var(--r);padding:15px;position:relative;overflow:hidden;}
.qmark{font-size:52px;color:rgba(232,255,71,.06);position:absolute;top:0;left:8px;font-family:Georgia,serif;line-height:1;}
.qtxt{font-size:13px;color:var(--tx);line-height:1.65;font-style:italic;position:relative;}
.qauth{font-size:10px;color:var(--tx3);margin-top:7px;text-transform:uppercase;letter-spacing:.07em;}
.pill-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:9px;}
.pill{font-size:10px;padding:3px 8px;border-radius:20px;}
.py{border:1px solid rgba(232,255,71,.3);color:var(--acc);background:rgba(232,255,71,.07);}
.pb{border:1px solid rgba(79,172,254,.3);color:var(--acc3);background:rgba(79,172,254,.07);}
.po{border:1px solid rgba(255,107,53,.3);color:var(--acc2);background:rgba(255,107,53,.07);}
.wkgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.wkd{display:flex;flex-direction:column;align-items:center;gap:3px;}
.wkdl{font-size:8px;color:var(--tx3);text-transform:uppercase;}
.wkdd{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;border:1px solid var(--b1);color:var(--tx3);background:var(--s2);}
.wkdd.bj{background:rgba(232,255,71,.1);color:var(--acc);border-color:rgba(232,255,71,.35);}
.wkdd.st{background:rgba(79,172,254,.1);color:var(--acc3);border-color:rgba(79,172,254,.35);}
.wkdd.td{box-shadow:0 0 0 2px var(--acc);}
.install-steps{counter-reset:step;}
.install-step{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:.5px solid var(--b1);}
.install-step:last-child{border-bottom:none;}
.step-num{width:24px;height:24px;border-radius:50%;background:rgba(232,255,71,.12);border:1px solid rgba(232,255,71,.3);color:var(--acc);font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-txt{font-size:12px;color:var(--tx2);line-height:1.5;}
.step-bold{color:var(--tx);font-weight:500;}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="hdr">
    <div class="hdr-l">
      <span class="hdr-greet" id="greet">good morning</span>
      <span class="hdr-title">Your BJJ OS</span>
    </div>
    <span class="badge b-bjj" id="dbadge">BJJ Day</span>
  </div>
  <div class="nav">
    <button class="nb on" onclick="go('today')">Today</button>
    <button class="nb" onclick="go('week')">Week</button>
    <button class="nb" onclick="go('tech')">Techniques</button>
    <button class="nb" onclick="go('drill')">Drill Gen</button>
    <button class="nb" onclick="go('log')">Class Log</button>
    <button class="nb" onclick="go('notif')">Notifications</button>
    <button class="nb" onclick="go('stats')">Stats</button>
  </div>
  <div class="ct" id="ct"></div>
  <div class="bb">
    <button class="bbb on" id="bb-today" onclick="go('today')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><rect x="3" y="3" width="16" height="16" rx="3"/><path d="M3 9h16"/><circle cx="8" cy="14" r="1.2" fill="currentColor" stroke="none"/><circle cx="11" cy="14" r="1.2" fill="currentColor" stroke="none"/></svg>
      <span>Today</span>
    </button>
    <button class="bbb" id="bb-tech" onclick="go('tech')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><circle cx="11" cy="11" r="8"/><path d="M11 7v4l2.5 2.5" stroke-linecap="round"/></svg>
      <span>Learn</span>
    </button>
    <button class="bbb" id="bb-drill" onclick="go('drill')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><path d="M5 11h12M13 7l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>Drill</span>
    </button>
    <button class="bbb" id="bb-log" onclick="go('log')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><rect x="4" y="3" width="14" height="16" rx="2"/><path d="M8 8h6M8 12h4" stroke-linecap="round"/></svg>
      <span>Log</span>
    </button>
    <button class="bbb" id="bb-notif" onclick="go('notif')">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="1.6"><path d="M11 3a6 6 0 016 6v3l1.5 2.5h-15L5 12V9a6 6 0 016-6z"/><path d="M9 17a2 2 0 004 0" stroke-linecap="round"/></svg>
      <span>Alerts</span>
    </button>
  </div>
</div>

<script>
const SK='bjjos_v1';
let S={water:0,smInt:0,smAuto:0,smLog:[],techSt:{},logs:[],classes:0,start:new Date().toISOString().split('T')[0],lastDay:'',notifEnabled:false};

function loadS(){
  try{
    const d=localStorage.getItem(SK);
    if(d){
      const p=JSON.parse(d);
      const t=new Date().toISOString().split('T')[0];
      if(p.lastDay!==t){p.water=0;p.smInt=0;p.smAuto=0;p.smLog=[];p.lastDay=t;}
      S={...S,...p};
    }else{S.lastDay=new Date().toISOString().split('T')[0];saveS();}
  }catch(e){}
}
function saveS(){try{localStorage.setItem(SK,JSON.stringify(S));}catch(e){}}

function dayType(){
  const d=new Date().getDay();
  if(d===6||d===1)return'bjj';
  if(d===3)return'drill';
  if(d===0||d===2||d===4)return'str';
  return'rest';
}

const TECHS=[
  {id:'back',title:'Back control — seatbelt',phase:'Month 1–2 · Core system',vid:'baSqWCtLysU',vtitle:'BJJ Fundamentals: Back Mount Seatbelt Control',
   detail:'The back is the highest-value position in BJJ. Seatbelt grip (one arm over shoulder, one under armpit), both heels hooked inside their thighs, hips pressed tight behind theirs. Whoever takes the back controls the fight.',
   keys:['Seatbelt: top arm over shoulder, bottom under armpit — hands clasped','Both heels hooked inside thighs, pointing inward','Hips glued to their lower back — zero space','When they escape, follow their shoulders not their hips'],
   drill:'Partner turtles. You get seatbelt + both hooks. Hold 30s while they resist. 15 reps each. Focus: keep top arm connected.'},
  {id:'rnc',title:'Rear naked choke (RNC)',phase:'Month 1–2 · Primary finish',vid:'l8-JI7NND3E',vtitle:'How To Perform The Perfect RNC — John Danaher',
   detail:'Primary submission from the back. Forearm blade under the chin — never the wrist or throat. Choking arm hand grips your own bicep. Free hand behind their head as back-pressure. Squeeze elbows AND extend chest backward simultaneously.',
   keys:['Blade of forearm under chin — not the wrist','Threaten with other arm to make them lift their chin','Bicep grip: your hand cups the back of their head','Finish: elbows together + chest extends back at the same time'],
   drill:'In back control, drill getting arm under chin without squeezing. Position only, 20x. Build the motor pattern before the squeeze.'},
  {id:'turtle',title:'Back take from turtle',phase:'Month 1–2 · Primary entry',vid:'3TgVQ-rmS8w',vtitle:'BJJ Back Take from Turtle — Competition Tested',
   detail:'When someone turtles (all fours), this is your main entry. Approach from the side, establish seatbelt chest-to-back, insert bottom hook first, tilt them to get the top hook. This is the most common back take entry you will hit in sparring.',
   keys:['Approach from the side — not directly from behind','Chest-to-back contact before hooks','Insert bottom hook first (inside knee), tilt for top hook','Pull far shoulder back to expose the back for the tilt'],
   drill:'Partner turtles. Practice seatbelt entry from the side + tilt. No hooks yet — just the entry motion. 15 reps each side.'},
  {id:'guard',title:'Guard recovery — shrimping',phase:'Month 1–2 · Survival',vid:'SdAhRzGrO1k',vtitle:'How To Shrimp in BJJ — Hip Escape Fundamentals',
   detail:'When someone passes your guard, recovering it is more important than any attack. Frame on their hip with your forearm, shrimp your hips away, re-establish guard. The shrimp is the most fundamental defensive movement in BJJ.',
   keys:['Forearm frame on hip — not palm, forearm is structural','Shrimp hips away from them — create distance','Outside knee comes in as shield while you re-guard','From side control: elbow-knee frame is your first move'],
   drill:'Solo: shrimp across the mat and back 5 times every session. This is the #1 solo BJJ drill. No mat needed — any floor space.'},
  {id:'xguard',title:'X-guard sweep',phase:'Now · Already learning in class',vid:'f7A1vv0-A2U',vtitle:'Basic X Guard Sweep — Bernardo Faria',
   detail:'You are being shown this now. X-guard: you are underneath with both legs creating an X around their base. Sweep direction: the side where you extend your bottom leg. Come up on top immediately after the sweep.',
   keys:['Feet control their ankle AND back of knee — not just hanging','Sweep only to the side where you extend bottom leg','Entry: sit under them as they stand or posture up','After sweep: stand up on top immediately — do not stay on back'],
   drill:'Drill the leg position on a seated partner — get into X-guard shape and feel both control points. 10 reps each.'},
  {id:'bow',title:'Bow and arrow choke',phase:'Month 2–3 · Gi finish',vid:'xqNhZVNhxnE',vtitle:'How To Bow and Arrow Choke From Back Control',

function reqNotif(){
  if(typeof Notification==='undefined'){alert('Open this app in Safari and add it to your home screen first for notifications to work.');return;}
  if(Notification.permission==='granted'){
    new Notification('BJJ OS',{body:'Test notification working. Daily reminders are active.',icon:'/icon-192.png'});
    S.notifEnabled=true;saveS();
    document.getElementById('nstatus').textContent='Test sent. Notifications working.';
    scheduleNotifs();return;
  }
  Notification.requestPermission().then(p=>{
    if(p==='granted'){S.notifEnabled=true;saveS();new Notification('BJJ OS active',{body:'Daily reminders enabled. Stay on the mat.',icon:'/icon-192.png'});scheduleNotifs();go('notif');}
    else{const el=document.getElementById('nstatus');if(el)el.textContent='Blocked. Check Safari Settings > Notifications.';}
  });
}
function scheduleNotifs(){
  if(typeof Notification==='undefined'||Notification.permission!=='granted')return;
  const now=new Date();
  NOTIFS.forEach(n=>{
    const[h,m]=n.time.split(':').map(Number);
    const target=new Date();target.setHours(h,m,0,0);
    if(target>now){setTimeout(()=>{if(Notification.permission==='granted')new Notification('BJJ OS',{body:n.txt,tag:n.time,icon:'/icon-192.png'});},target-now);}
  });
}

  <div class="sec"><div class="sl">Smoking — today</div>
    <div class="card">
      <div class="sgrid" style="margin-bottom:8px">
        <div class="scard"><div class="snum" style="color:var(--ok)">${S.smInt}</div><div class="slabel">intentional</div></div>
        <div class="scard"><div class="snum" style="color:var(--warn)">${S.smAuto}</div><div class="slabel">automatic</div></div>
      </div>
      ${tot?`<div style="font-size:11px;color:var(--tx2);line-height:1.5">${pct}% intentional today. ${pct>60?'Good awareness — most are conscious choices.':'Mostly automatic — habit triggers, not cravings. Easier to replace.'}</div>`:'<div style="font-size:11px;color:var(--tx3)">Log from the Today tab.</div>'}
    </div></div>`;
}

function init(){
  loadS();
  const h=new Date().getHours();
  document.getElementById('greet').textContent=h<12?'good morning':h<17?'good afternoon':'good evening';
  const type=dayType();
  const badge=document.getElementById('dbadge');
  badge.textContent={bjj:'BJJ Day',drill:'Drilling Day',str:'Strength Day',rest:'Rest Day'}[type];
  badge.className='badge '+{bjj:'b-bjj',drill:'b-drl',str:'b-str',rest:'b-rst'}[type];
  if(S.notifEnabled&&typeof Notification!=='undefined'&&Notification.permission==='granted')scheduleNotifs();
  if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(()=>{});
  go('today');
}
init();
</script>
</body>
</html>
